    <main>
      <section id="section2">
        <div class="sec5Tit content1" data-i18n="myAccountTitle">My Account</div>

        <!-- NOT LOGGED IN -->
        <div id="account-login" style="display:flex;flex-direction:column;align-items:center;gap:1rem;padding:2rem;">
          <p style="color:beige;font-family:'Josefin Sans',sans-serif;font-size:0.9rem;text-align:center;" data-i18n="accountLoginPrompt">Enter your mobile number to view your account</p>
          <div style="display:flex;align-items:center;border:2px solid #ffc800;border-radius:0.75rem;overflow:hidden;max-width:320px;width:100%;">
            <span style="padding:0.6rem 0.75rem;background:rgba(255,200,0,0.1);color:#ffc800;font-family:'Josefin Sans',sans-serif;font-size:0.9rem;font-weight:700;border-right:2px solid #ffc800;white-space:nowrap;">+249</span>
            <input id="account_msisdn" type="tel" placeholder="998688782" maxlength="9" autocomplete="off" style="flex:1;border:none;background:transparent;padding:0.6rem 0.75rem;font-family:'Josefin Sans',sans-serif;font-size:0.9rem;outline:none;color:beige;">
          </div>
          <p id="account_error" style="display:none;color:#dc2626;font-family:'Josefin Sans',sans-serif;font-size:0.8rem;text-align:center;"></p>
          <button id="account_login_btn" aria-label="check account" data-i18n="accountCheckBtn" style="background:#ffc800;color:#000;font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:1rem;text-transform:uppercase;padding:0.6rem 2rem;border-radius:0.75rem;border:none;cursor:pointer;">Check Status</button>
        </div>

        <!-- LOGGED IN: profile card -->
        <div id="account-profile" style="display:none;flex-direction:column;align-items:center;gap:1.25rem;padding:2rem;">
          <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#00c5eb,#006177);display:flex;align-items:center;justify-content:center;font-size:2rem;">👤</div>
          <p id="profile_msisdn" style="color:#ffc800;font-family:'Josefin Sans',sans-serif;font-size:1.1rem;font-weight:700;margin:0;"></p>
          <p style="color:rgba(255,255,255,0.5);font-family:'Josefin Sans',sans-serif;font-size:0.8rem;margin:0;" data-i18n="accountService">Service: AiGamopedia MTN Sudan</p>
          <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,200,0,0.3);border-radius:1rem;padding:1.25rem 1.5rem;width:100%;max-width:340px;box-sizing:border-box;display:flex;flex-direction:column;gap:0.9rem;">
            <div style="display:flex;justify-content:space-between;">
              <span style="color:rgba(255,255,255,0.5);font-family:'Josefin Sans',sans-serif;font-size:0.8rem;" data-i18n="accountStatus">Status</span>
              <span id="profile_status" style="font-family:'Josefin Sans',sans-serif;font-size:0.85rem;font-weight:700;"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="color:rgba(255,255,255,0.5);font-family:'Josefin Sans',sans-serif;font-size:0.8rem;" data-i18n="accountPrice">Price</span>
              <span id="profile_price" style="color:beige;font-family:'Josefin Sans',sans-serif;font-size:0.85rem;"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="color:rgba(255,255,255,0.5);font-family:'Josefin Sans',sans-serif;font-size:0.8rem;" data-i18n="accountValidity">Validity</span>
              <span id="profile_validity" style="color:beige;font-family:'Josefin Sans',sans-serif;font-size:0.85rem;"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="color:rgba(255,255,255,0.5);font-family:'Josefin Sans',sans-serif;font-size:0.8rem;" data-i18n="accountActDate">Activated</span>
              <span id="profile_actdate" style="color:beige;font-family:'Josefin Sans',sans-serif;font-size:0.85rem;"></span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="color:rgba(255,255,255,0.5);font-family:'Josefin Sans',sans-serif;font-size:0.8rem;" data-i18n="accountRenewDate">Next Renewal</span>
              <span id="profile_renewdate" style="color:beige;font-family:'Josefin Sans',sans-serif;font-size:0.85rem;"></span>
            </div>
          </div>
          <button id="account_logout_btn" aria-label="logout" data-i18n="accountLogout" style="background:transparent;color:#dc2626;font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:0.9rem;text-transform:uppercase;padding:0.5rem 1.5rem;border-radius:0.75rem;border:2px solid #dc2626;cursor:pointer;">Logout</button>
